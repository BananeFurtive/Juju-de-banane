</head>

<body>

<div id="window">

<div id="titlebar">
Juju de banane - Chat
</div>

<div id="main">

<div id="users"></div>

<div id="chat">

<div id="messages"></div>

<div id="send">
<input id="text" placeholder="Message...">
<button onclick="send()">Envoyer</button>
</div>

</div>
</div>

</div>

<script>

let pseudo = localStorage.getItem("pseudo")

if(!pseudo){
pseudo = prompt("Choisis ton pseudo")
localStorage.setItem("pseudo",pseudo)
}

let currentUser = null
let users = {}

let channel = new BroadcastChannel("juju_chat")

channel.onmessage = e=>{
receive(e.data)
}

function addUser(name){

if(name===pseudo) return
if(users[name]) return

users[name]=true

let div=document.createElement("div")
div.className="user"
div.innerText=name

div.onclick=()=>{
currentUser=name
loadMessages()
}

document.getElementById("users").appendChild(div)
}

function send(){

if(!currentUser) return

let txt=document.getElementById("text").value
if(!txt) return

let msg={
from:pseudo,
to:currentUser,
text:txt,
time:Date.now()
}

store(msg)

channel.postMessage(msg)

document.getElementById("text").value=""
loadMessages()
}

function receive(msg){

addUser(msg.from)

store(msg)

if(currentUser===msg.from)
loadMessages()
}

function store(msg){

let data=JSON.parse(localStorage.getItem("messages")||"[]")
data.push(msg)
localStorage.setItem("messages",JSON.stringify(data))
}

function loadMessages(){

let box=document.getElementById("messages")
box.innerHTML=""

let data=JSON.parse(localStorage.getItem("messages")||"[]")

data.forEach(m=>{

if(
(m.from===pseudo && m.to===currentUser) ||
(m.from===currentUser && m.to===pseudo)
){

let div=document.createElement("div")

div.className="msg "+(m.from===pseudo?"me":"other")

let date=new Date(m.time)

div.innerHTML=
"<div>"+m.text+"</div>"+
"<div class='time'>"+
date.getHours()+":"+String(date.getMinutes()).padStart(2,"0")+
"</div>"

box.appendChild(div)

}

})

box.scrollTop=box.scrollHeight

}

channel.postMessage({
from:pseudo,
text:"__join__"
})

</script>

</body>
