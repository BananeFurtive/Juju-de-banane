```html
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Juju de banane</title>

<style>

body{
margin:0;
font-family:monospace;
background:#0a0a0a;
color:#fff;
display:flex;
flex-direction:column;
height:100vh;
}

/* header */

#top{
background:#111;
padding:10px;
text-align:center;
font-weight:bold;
font-size:20px;
color:#ffe600;
text-shadow:0 0 6px #ffe600;
border-bottom:2px solid #333;
}

/* layout */

#container{
flex:1;
display:flex;
overflow:hidden;
}

/* users */

#users{
width:90px;
background:#111;
border-right:2px solid #222;
overflow:auto;
}

.user{
padding:8px;
border-bottom:1px solid #222;
cursor:pointer;
color:#9aff00;
}

.user:hover{
background:#1c1c1c;
}

/* chat */

#chat{
flex:1;
display:flex;
flex-direction:column;
}

#messages{
flex:1;
overflow:auto;
padding:10px;
}

/* messages */

.msg{
max-width:70%;
margin:6px 0;
padding:6px 10px;
border-radius:6px;
font-size:14px;
}

.me{
margin-left:auto;
background:#ffe600;
color:#000;
}

.other{
background:#222;
border:1px solid #333;
}

.time{
font-size:10px;
opacity:0.6;
}

/* send */

#send{
display:flex;
border-top:2px solid #222;
}

#text{
flex:1;
padding:12px;
border:none;
background:#111;
color:white;
font-size:14px;
}

button{
width:80px;
border:none;
background:#ffe600;
font-weight:bold;
}

/* corruption effect */

.corrupt{
animation:glitch 0.2s infinite;
}

@keyframes glitch{

0%{transform:translate(0)}
20%{transform:translate(-1px,1px)}
40%{transform:translate(1px,-1px)}
60%{transform:translate(-1px,0)}
80%{transform:translate(1px,1px)}
100%{transform:translate(0)}

}

</style>
</head>

<body>

<div id="top">🍌 JUJU DE BANANE</div>

<div id="container">

<div id="users"></div>

<div id="chat">

<div id="messages"></div>

<div id="send">
<input id="text" placeholder="message...">
<button onclick="send()">send</button>
</div>

</div>

</div>

<script>

let pseudo=localStorage.getItem("pseudo")

if(!pseudo){
pseudo=prompt("pseudo ?")
localStorage.setItem("pseudo",pseudo)
}

let users={}
let currentUser=null

let channel=new BroadcastChannel("banane_chat")

channel.onmessage=e=>{
receive(e.data)
}

function addUser(name){

if(name===pseudo)return
if(users[name])return

users[name]=true

let div=document.createElement("div")
div.className="user corrupt"
div.innerText=name

div.onclick=()=>{
currentUser=name
loadMessages()
}

document.getElementById("users").appendChild(div)
}

function send(){

if(!currentUser)return

let txt=document.getElementById("text").value
if(!txt)return

let msg={
from:pseudo,
to:currentUser,
text:txt,
time:Date.now()
}

store(msg)

channel.postMessage(msg)

document.getElementById("text").value=""

loadMessages()
}

function receive(msg){

addUser(msg.from)

store(msg)

if(currentUser===msg.from)
loadMessages()
}

function store(msg){

let data=JSON.parse(localStorage.getItem("msgs")||"[]")

data.push(msg)

localStorage.setItem("msgs",JSON.stringify(data))
}

function loadMessages(){

let box=document.getElementById("messages")

box.innerHTML=""

let data=JSON.parse(localStorage.getItem("msgs")||"[]")

data.forEach(m=>{

if(
(m.from===pseudo&&m.to===currentUser)||
(m.from===currentUser&&m.to===pseudo)
){

let div=document.createElement("div")

div.className="msg "+(m.from===pseudo?"me":"other")

let d=new Date(m.time)

div.innerHTML=
m.text+
"<div class=time>"+
d.getHours()+":"+String(d.getMinutes()).padStart(2,"0")+
"</div>"

box.appendChild(div)

}

})

box.scrollTop=box.scrollHeight

}

channel.postMessage({from:pseudo})

</script>

</body>
</html>
```
